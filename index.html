<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SockTI</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fffdf8;
      --ink: #141414;
      --muted: #6f6a63;
      --line: #d7d0c5;
      --accent: #111111;
      --accent-2: #b8ff65;
      --shadow: 0 18px 40px rgba(20, 20, 20, 0.08);
      --radius: 22px;
      --font: "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(184, 255, 101, 0.22), transparent 28%),
        linear-gradient(180deg, #f8f4ea 0%, #f1ece2 100%);
      color: var(--ink);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0 14px 40px;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .page {
      display: none;
      animation: fade 220ms ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: rgba(255, 253, 248, 0.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(215, 208, 197, 0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 22px 22px;
      position: relative;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(247, 243, 235, 0.9)),
        #fff;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.06);
      color: var(--ink);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    h1 {
      margin-top: 18px;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero-sub {
      margin-top: 12px;
      font-size: 16px;
      line-height: 1.65;
      color: var(--muted);
    }

    .sock-stage {
      margin-top: 24px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, #111 0 18%, transparent 18% 100%),
        linear-gradient(135deg, #262626, #090909);
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .sock-stage::before,
    .sock-stage::after {
      pointer-events: none;
      z-index: 2;
    }

    .sock-stage::before,
    .sock-stage::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(184, 255, 101, 0.15);
      border-radius: 50%;
      filter: blur(6px);
    }

    .sock-stage::before {
      left: -18px;
      top: -28px;
    }

    .sock-stage::after {
      right: -28px;
      bottom: -40px;
    }

    .slot-machine {
      width: min(298px, 92%);
      height: 204px;
      position: relative;
      z-index: 3;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04)),
        #181818;
      border: 2px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,0.4),
        0 18px 34px rgba(0,0,0,0.35);
      overflow: hidden;
      transform-origin: center;
    }

    .slot-machine::before,
    .slot-machine::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 42px;
      z-index: 3;
      pointer-events: none;
    }

    .slot-machine::before {
      top: 0;
      background: linear-gradient(180deg, #181818, rgba(24,24,24,0));
    }

    .slot-machine::after {
      bottom: 0;
      background: linear-gradient(0deg, #181818, rgba(24,24,24,0));
    }

    .slot-window {
      position: absolute;
      inset: 32px 24px 56px;
      border-radius: 16px;
      background: #f8f3e8;
      border: 3px solid #050505;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .slot-window::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 10px;
      border: 2px solid rgba(0, 0, 0, 0.08);
      z-index: 2;
      pointer-events: none;
    }

    .slot-reel {
      position: relative;
      background: rgba(255,255,255,0.45);
      border-radius: 12px;
      overflow: hidden;
      will-change: transform;
    }

    .slot-track {
      transition: transform 120ms linear;
    }

    .slot-item {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slot-item svg {
      width: 68px;
      height: 68px;
      display: block;
      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.18));
    }

    .slot-knob {
      position: absolute;
      right: 11px;
      top: 66px;
      width: 16px;
      height: 38px;
      border-radius: 999px;
      background: #b8ff65;
      border: 2px solid #050505;
      box-shadow: inset -3px 0 0 rgba(0,0,0,0.14);
      z-index: 4;
    }

    .slot-label {
      position: absolute;
      left: 14px;
      top: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 10px;
      letter-spacing: 0.12em;
      z-index: 4;
    }

    .slot-status {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      min-width: 112px;
      text-align: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.12em;
      z-index: 4;
    }

    .slot-status.win {
      background: rgba(184, 255, 101, 0.18);
      color: #d7ff9d;
    }

    .slot-status.lose {
      background: rgba(255, 106, 106, 0.16);
      color: #ffc7c7;
    }

    .slot-machine.jackpot {
      animation: jackpotFlash 760ms ease;
    }

    .slot-machine.jackpot::before,
    .slot-machine.jackpot::after {
      background: rgba(184, 255, 101, 0.35);
      filter: blur(10px);
    }

    .slot-machine.miss {
      animation: missShake 360ms ease;
    }

    @keyframes jackpotFlash {
      0% {
        box-shadow:
          inset 0 0 0 2px rgba(0,0,0,0.4),
          0 18px 34px rgba(0,0,0,0.35);
      }
      28% {
        box-shadow:
          inset 0 0 0 2px rgba(184,255,101,0.52),
          0 0 0 4px rgba(184,255,101,0.18),
          0 0 28px rgba(184,255,101,0.48),
          0 18px 34px rgba(0,0,0,0.35);
      }
      56% {
        box-shadow:
          inset 0 0 0 2px rgba(0,0,0,0.4),
          0 0 0 6px rgba(184,255,101,0.10),
          0 0 14px rgba(184,255,101,0.25),
          0 18px 34px rgba(0,0,0,0.35);
      }
      100% {
        box-shadow:
          inset 0 0 0 2px rgba(0,0,0,0.4),
          0 18px 34px rgba(0,0,0,0.35);
      }
    }

    @keyframes missShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .slot-track {
        transition: none;
      }

      .slot-machine.jackpot,
      .slot-machine.miss {
        animation: none;
      }
    }

    .section {
      padding: 0 22px 22px;
    }

    .bullet-list {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .bullet {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(20, 20, 20, 0.04);
      font-size: 14px;
      line-height: 1.6;
      color: #2d2a27;
    }

    .btn-row {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(20, 20, 20, 0.08);
      color: var(--ink);
    }

    .quiz {
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .progress {
      margin-top: 16px;
      height: 8px;
      background: rgba(20, 20, 20, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #111 0%, #5a5a5a 65%, #b8ff65 100%);
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .question-card {
      margin-top: 18px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(20, 20, 20, 0.04);
    }

    .question-tag {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(184, 255, 101, 0.36);
      font-size: 12px;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: 24px;
      line-height: 1.35;
      letter-spacing: -0.03em;
    }

    .question-hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .options {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .opt {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(20, 20, 20, 0.08);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .opt.selected {
      border-color: var(--ink);
      background: #f3f7ea;
      transform: translateY(-1px);
    }

    .opt-key {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(20, 20, 20, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .opt-text {
      font-size: 15px;
      line-height: 1.6;
    }

    .quiz-actions {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn[disabled] {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .result {
      padding: 22px;
    }

    .result-head {
      padding: 24px 22px 22px;
      background:
        radial-gradient(circle at top right, rgba(184,255,101,0.3), transparent 26%),
        linear-gradient(180deg, #fffefb 0%, #f5efe5 100%);
      border-bottom: 1px solid rgba(20, 20, 20, 0.06);
    }

    .result-type {
      margin-top: 12px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .result-sub {
      margin-top: 10px;
      font-size: 16px;
      color: var(--muted);
    }

    .result-emoji {
      margin-top: 18px;
      width: 164px;
      height: 164px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(20,20,20,0.05), rgba(20,20,20,0.02)),
        rgba(255,255,255,0.66);
      border: 1px solid rgba(20, 20, 20, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .result-emoji svg {
      width: 136px;
      height: 136px;
      display: block;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.12));
    }

    .quote {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #161616;
      color: #f6f3eb;
      font-size: 18px;
      line-height: 1.6;
    }

    .meta {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .traits {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .trait {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.06);
      font-size: 13px;
    }

    .result-desc {
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.8;
      color: #2b2926;
    }

    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 375px) {
      h1 {
        font-size: 34px;
      }

      .question-text {
        font-size: 21px;
      }

      .result-type {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="page active" id="page-home">
      <div class="card">
        <div class="hero">
          <div class="eyebrow">SockTI</div>
          <h1>你本人到底是什么袜感？</h1>
          <p class="hero-sub">
            16 种袜型人格，看看你到底是哪一双。
          </p>
          <div class="sock-stage">
            <div class="slot-machine" aria-hidden="true">
              <div class="slot-label">SOCK SLOT</div>
              <div class="slot-window">
                <div class="slot-reel"><div class="slot-track" id="slot-track-0"></div></div>
                <div class="slot-reel"><div class="slot-track" id="slot-track-1"></div></div>
                <div class="slot-reel"><div class="slot-track" id="slot-track-2"></div></div>
              </div>
              <div class="slot-knob"></div>
              <div class="slot-status" id="slot-status">SPINNING</div>
            </div>
          </div>
        </div>
        <div class="section">
          <div class="bullet-list">
            <div class="bullet">测完你就知道。</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="startQuiz()">开始测试</button>
          </div>
        </div>
      </div>
      <p class="footer-note">建议手机打开。做完可以直接分享结果文案。</p>
    </section>

    <section class="page" id="page-quiz">
      <div class="card quiz">
        <div class="topbar">
          <button class="btn btn-secondary" style="padding:10px 14px;font-size:14px;" onclick="goBack()">返回</button>
          <div id="quiz-counter">1 / 12</div>
        </div>
        <div class="progress">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="question-card">
          <div class="question-tag" id="question-tag">袜格雷达启动中</div>
          <div class="question-text" id="question-text"></div>
          <div class="question-hint" id="question-hint"></div>
        </div>

        <div class="options" id="options-wrap"></div>

        <div class="quiz-actions">
          <button class="btn btn-secondary" onclick="goBack()">上一题</button>
          <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" disabled>继续</button>
        </div>
      </div>
    </section>

    <section class="page" id="page-result">
      <div class="card">
        <div class="result-head">
          <div class="eyebrow">测试结果 / SockTI</div>
          <div class="result-type" id="result-type"></div>
          <div class="result-sub" id="result-sub"></div>
          <div class="result-emoji" id="result-emoji"></div>
          <div class="quote" id="result-quote"></div>
          <div class="meta" id="result-meta"></div>
        </div>
        <div class="result">
          <div class="traits" id="trait-list"></div>
          <div class="result-desc" id="result-desc"></div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="shareResult()">分享结果</button>
            <button class="btn btn-secondary" onclick="retryQuiz()">再测一次</button>
          </div>
        </div>
      </div>
      <p class="footer-note">这只是风格测试，不是身份判断。好玩就行，别太当真。</p>
    </section>
  </div>

  <script>
    const questions = [
      {
        text: "朋友说今晚有个陌生局，问你来不来，你第一反应是？",
        hint: "先看你是先进去还是先观察。",
        options: [
          { key: "A", text: "去，先到了再说，场子熟不熟可以现场解决。", dim: "E" },
          { key: "B", text: "先看看都是什么人，再决定要不要出现。", dim: "I" },
          { key: "C", text: "去不去都行，但最好别搞得太正式。", dim: "P" }
        ]
      },
      {
        text: "出门前选袜子，你更像哪种人？",
        hint: "看你对细节有没有秩序感。",
        options: [
          { key: "A", text: "会想整体搭配，颜色长度都要顺。", dim: "J" },
          { key: "B", text: "抓到哪双算哪双，舒服最重要。", dim: "P" },
          { key: "C", text: "只要那个感觉对了，细节可以后补。", dim: "W" }
        ]
      },
      {
        text: "别人第一次见你，最容易给你的评价是？",
        hint: "第一印象通常很诚实。",
        options: [
          { key: "A", text: "有点距离感，但挺有型。", dim: "C" },
          { key: "B", text: "很好聊，没什么攻击性。", dim: "W" },
          { key: "C", text: "看着不吵，但其实很有存在感。", dim: "I" }
        ]
      },
      {
        text: "有好感的人坐在你附近，你会？",
        hint: "靠近方式最暴露本能。",
        options: [
          { key: "A", text: "找个自然理由靠近一点。", dim: "A" },
          { key: "B", text: "先不动，等他来打开局面。", dim: "M" },
          { key: "C", text: "不一定靠近，但会让对方注意到你。", dim: "E" }
        ]
      },
      {
        text: "你的衣柜整体更接近哪种状态？",
        hint: "看你平时是怎么管理生活的。",
        options: [
          { key: "A", text: "分区明确，黑白灰和彩色各有位置。", dim: "J" },
          { key: "B", text: "能穿就行，但总有几件舍不得扔。", dim: "P" },
          { key: "C", text: "东西不一定多，但每件都有自己的戏。", dim: "W" }
        ]
      },
      {
        text: "你更喜欢别人怎么形容你？",
        hint: "理想自我比现实还诚实。",
        options: [
          { key: "A", text: "稳、利落、边界清楚。", dim: "C" },
          { key: "B", text: "有趣、鲜活、相处不累。", dim: "W" },
          { key: "C", text: "不一定热闹，但很值得继续了解。", dim: "M" }
        ]
      },
      {
        text: "在一群人里，你通常是？",
        hint: "社交姿态最能区分外放和内敛。",
        options: [
          { key: "A", text: "先把气氛带起来的那个。", dim: "E" },
          { key: "B", text: "先看一圈，再决定自己要不要加入。", dim: "I" },
          { key: "C", text: "不一定说很多，但别人会记得你穿什么、怎么坐、怎么笑。", dim: "C" }
        ]
      },
      {
        text: "约会迟到了十分钟，你更可能？",
        hint: "小失误最能看出底层反应。",
        options: [
          { key: "A", text: "已经在路上想好怎么补偿和安抚了。", dim: "A" },
          { key: "B", text: "会有点烦，但还是尽量维持体面。", dim: "J" },
          { key: "C", text: "嘴上说没事，心里已经开始重新评估这个人。", dim: "C" }
        ]
      },
      {
        text: "如果要选一种关系节奏，你更偏向？",
        hint: "快慢感决定很多东西。",
        options: [
          { key: "A", text: "有来有回，最好别太拖。", dim: "A" },
          { key: "B", text: "慢一点没关系，熟了再放开。", dim: "M" },
          { key: "C", text: "先轻松一点，别一上来就太有压力。", dim: "P" }
        ]
      },
      {
        text: "你更接近哪种性感？",
        hint: "不是外貌，是整个人散发出来的气味。",
        options: [

      const isCuff = y <= (style.lowcut ? 1 : style.short ? 2 : 3);
      const isHeel = x >= 8 && x <= 11 && y >= 10 && y <= 12;
      const isToe = x >= 10 && y >= 12;
      const stripeRows = style.lowcut ? [] : style.short ? [3] : [4, 6];

      let fill = style.body;
      if (isCuff) fill = style.cuff;
      if (isHeel) fill = style.heel;
      if (isToe) fill = style.toe;

      if (style.doubleCuff && (y === 2 || y === 4)) fill = "#c8c8c8";

      if (style.stripes && stripeRows.includes(y)) {
        fill = style.stripes[(stripeRows.indexOf(y)) % style.stripes.length];
      }

      if (style.split && x >= 8 && y >= 8) {
        fill = "#ffffff";
      }

      if (style.slouch && y >= 3 && y <= 8) {
        if (y % 2 === 0 && x <= 8) fill = "#efe6db";
      }

      if (style.diamonds) {
        const diamond =
          (x === 5 && y === 5) || (x === 4 && y === 6) || (x === 6 && y === 6) ||
          (x === 5 && y === 7) || (x === 8 && y === 7) || (x === 7 && y === 8) ||
          (x === 9 && y === 8) || (x === 8 && y === 9);

      if (style.fuzzy && y >= 2 && y <= 8 && (x + y) % 3 === 0) {
        fill = "#efe2cc";

      return fill;

          track.style.transform = `translateY(-${travel}px)`;
        });

        const settleAt = roundDuration + stopGap + 80;
        window.setTimeout(() => {
          if (round !== slotRound) return;
          const hit = picks[0] === picks[1] && picks[1] === picks[2];
          if (machine) {
            machine.classList.remove("jackpot", "miss");
            machine.getBoundingClientRect();
            machine.classList.add(hit ? "jackpot" : "miss");
          }
          if (status) {
            status.textContent = hit ? "WIN" : "✕";
            status.classList.toggle("win", hit);
            status.classList.toggle("lose", !hit);
          }
        }, settleAt);

        slotTimer = window.setTimeout(runRound, roundDuration + 1200);
      }

      if (slotTimer) {
        window.clearTimeout(slotTimer);
      }
      runRound();
    }

    function showResult() {
      const code = calcResultCode();
      const data = results[code] || results.IJCM;
      const now = new Date();

      document.getElementById("result-type").textContent = data.title;
      document.getElementById("result-sub").textContent = data.subtitle;
      document.getElementById("result-emoji").innerHTML = buildSockSvg(data.sock);
      document.getElementById("result-quote").textContent = data.quote;
      document.getElementById("result-meta").textContent = `${code} 型袜格 | ${now.getMonth() + 1}月${now.getDate()}日`;
      document.getElementById("result-desc").textContent = data.desc;

      const traitList = document.getElementById("trait-list");
      traitList.innerHTML = "";
      data.traits.forEach((trait) => {
        const span = document.createElement("span");
        span.className = "trait";
        span.textContent = trait;
        traitList.appendChild(span);
      });

      showPage("page-result");
    }

    function shareResult() {
      const type = document.getElementById("result-type").textContent;
      const subtitle = document.getElementById("result-sub").textContent;
      const text = `我在 SockTI 测出来是「${type}」\n${subtitle}\n你也来测测你是哪种袜子？`;

      if (navigator.share) {
        navigator.share({
          title: "SockTI 袜格测试",
          text,
          url: window.location.href
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(`${text}\n${window.location.href}`).then(() => {
          alert("结果文案已复制，可以直接发给朋友。");
        }).catch(() => {
          alert(text);
        });
      }
    }

    function retryQuiz() {
      startQuiz();
    }

    renderSlotMachine();
  </script>
</body>
</html>
